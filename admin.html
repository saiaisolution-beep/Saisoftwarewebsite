<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Admin — Sai Softwares</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>⚙️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body class="admin-body">

    <!-- Admin Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
        <div class="admin-sidebar-header">
            <a href="index.html" class="logo">
                <div class="logo-icon">SS</div>
                <span>CMS Admin</span>
            </a>
        </div>
        <nav class="admin-nav" id="admin-nav">
            <button class="admin-nav-btn active" data-section="dashboard">
                <span class="nav-icon">📊</span> Dashboard
            </button>
            <button class="admin-nav-btn" data-section="company">
                <span class="nav-icon">🏢</span> Company Info
            </button>
            <button class="admin-nav-btn" data-section="hero">
                <span class="nav-icon">🎯</span> Hero Section
            </button>
            <button class="admin-nav-btn" data-section="services">
                <span class="nav-icon">🚀</span> Services
            </button>
            <button class="admin-nav-btn" data-section="portfolio">
                <span class="nav-icon">💼</span> Portfolio
            </button>
            <button class="admin-nav-btn" data-section="team">
                <span class="nav-icon">👥</span> Team
            </button>
            <button class="admin-nav-btn" data-section="testimonials">
                <span class="nav-icon">⭐</span> Testimonials
            </button>
            <button class="admin-nav-btn" data-section="faq">
                <span class="nav-icon">❓</span> FAQ
            </button>
            <button class="admin-nav-btn" data-section="contact">
                <span class="nav-icon">💬</span> Contact
            </button>
        </nav>
        <div class="admin-sidebar-footer">
            <a href="index.html" class="btn btn-outline" style="width:100%; font-size:0.85rem;">← View Website</a>
        </div>
    </aside>

    <!-- Admin Main Content -->
    <main class="admin-main">
        <header class="admin-topbar">
            <button class="admin-sidebar-toggle" id="sidebar-toggle">☰</button>
            <h1 class="admin-page-title" id="admin-page-title">Dashboard</h1>
            <div class="admin-topbar-actions">
                <button class="btn btn-primary btn-sm" id="save-all-btn">💾 Save Changes</button>
            </div>
        </header>

        <div class="admin-content" id="admin-content">
            <!-- Dynamic content renders here -->
        </div>
    </main>

    <!-- Toast notification -->
    <div class="admin-toast" id="admin-toast">
        <span class="toast-icon">✅</span>
        <span class="toast-text">Changes saved successfully!</span>
    </div>

    <script src="js/cms-data.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
